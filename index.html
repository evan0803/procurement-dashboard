<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>採購情報中心</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#07090f;
  --bg2:#0d1119;
  --bg3:#111827;
  --bg4:#192032;
  --border:rgba(255,255,255,.055);
  --border2:rgba(255,255,255,.11);
  --border3:rgba(255,255,255,.18);
  --text:#edf0f8;
  --text2:#7a8ba8;
  --text3:#3a4a62;
  --accent:#4f9cf9;
  --accent2:#38bdf8;
  --up:#ff6b6b;
  --dn:#3ed98a;
  --warn:#f5a623;
  --gold:#fbbf24;
  --r:14px;
  --rs:10px;
  --rx:100px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 90% 60% at 50% -5%,rgba(79,156,249,.055),transparent),
    radial-gradient(ellipse 50% 40% at 95% 95%,rgba(56,189,248,.03),transparent);
  color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
  min-height:100vh;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}

.mono{font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Header ── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(7,9,15,.9);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border-bottom:1px solid var(--border2);
  padding:11px 18px;
  display:flex;align-items:center;justify-content:space-between;
}
.hdr-l{display:flex;align-items:center;gap:12px}
.logo-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(145deg,rgba(79,156,249,.25),rgba(56,189,248,.15));
  border:1px solid rgba(79,156,249,.28);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 0 18px rgba(79,156,249,.12),inset 0 1px 0 rgba(255,255,255,.08);
}
.status-indicator{
  display:flex;align-items:center;gap:7px;
  padding:5px 12px 5px 9px;
  background:rgba(62,217,138,.07);
  border:1px solid rgba(62,217,138,.18);
  border-radius:var(--rx);
}
.dot{
  position:relative;width:7px;height:7px;border-radius:50%;
  background:var(--dn);box-shadow:0 0 8px var(--dn);
  animation:pulse 2.5s ease-in-out infinite;flex-shrink:0;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.8)}}
.status-txt{font-size:12px;color:var(--dn);font-weight:500;letter-spacing:.04em}
.hdr-title{font-size:16px;font-weight:600;letter-spacing:.01em}
.hdr-sub{font-size:12px;color:var(--text2);margin-top:1px;letter-spacing:.04em}
.refresh-btn{
  background:rgba(79,156,249,.08);
  border:1px solid rgba(79,156,249,.22);
  color:var(--accent);border-radius:var(--rx);
  padding:8px 18px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  transition:all .22s;display:flex;align-items:center;gap:5px;letter-spacing:.04em;
}
.refresh-btn:hover{background:rgba(79,156,249,.16);border-color:rgba(79,156,249,.42);box-shadow:0 0 16px rgba(79,156,249,.18)}
.refresh-btn:active{transform:scale(.95)}
.spin{animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Nav ── */
.nav{
  display:flex;background:var(--bg2);
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;padding:0 8px;gap:4px;
}
.nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex:1;min-width:90px;padding:14px 10px 13px;
  font-size:14px;font-weight:500;color:var(--text2);
  background:none;border:none;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  border-bottom:2px solid transparent;transition:all .22s;
  white-space:nowrap;letter-spacing:.02em;
}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Pages ── */
.page{display:none;padding:16px}
.page.active{display:block}

/* ── Loading ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
.loading-txt{font-size:13px;color:var(--text3);letter-spacing:.08em}

/* ── KPI Cards ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kcard{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:18px 16px;
  position:relative;overflow:hidden;transition:border-color .25s,box-shadow .25s;
}
.kcard:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.25)}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ca,var(--accent));opacity:.85}
.kcard::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 70% at 10% 0%,var(--ca-alpha,rgba(79,156,249,.06)),transparent);pointer-events:none}
.klabel{font-size:11px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;font-weight:500;margin-bottom:8px}
.kval{font-size:26px;font-weight:400;font-family:'DM Mono',monospace;line-height:1;position:relative;z-index:1}
.kchg{font-size:13px;margin-top:7px;font-family:'DM Mono',monospace}
.ksub{font-size:13px;color:var(--text2);margin-top:5px;letter-spacing:.02em}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;font-size:13px;padding:3px 10px;border-radius:var(--rx);font-family:'DM Mono',monospace;font-weight:500}
.b-up{background:rgba(255,107,107,.12);color:var(--up);border:1px solid rgba(255,107,107,.2)}
.b-dn{background:rgba(62,217,138,.1);color:var(--dn);border:1px solid rgba(62,217,138,.18)}
.b-neu{background:rgba(255,255,255,.04);color:var(--text3);border:1px solid var(--border)}
.b-hot{background:rgba(255,107,107,.18);color:var(--up);border:1px solid rgba(255,107,107,.3);font-weight:700;box-shadow:0 0 10px rgba(255,107,107,.12)}
.b-warn{background:rgba(245,166,35,.12);color:var(--warn);border:1px solid rgba(245,166,35,.22)}

/* ── Alert ── */
.alert{
  background:rgba(245,166,35,.05);border:1px solid rgba(245,166,35,.15);
  border-left:3px solid var(--warn);border-radius:var(--rs);
  padding:12px 16px;margin-bottom:16px;font-size:14px;color:var(--text2);line-height:1.7;
}
.alert b{color:var(--warn)}

/* ── Date Row ── */
.date-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding:10px 16px;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);
}
.date-lbl{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.08em}
.date-val{font-size:14px;color:var(--accent2);font-family:'DM Mono',monospace;font-weight:500}

/* ── Sections ── */
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;transition:background .2s}
.sec-hdr:hover{background:rgba(255,255,255,.02)}
.sec-title{font-size:13px;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.sec-tog{font-size:15px;color:var(--text3);line-height:1}
.tbl-wrap{padding:0 4px 8px}

/* ════════════════════════════════
   Table — 4欄版本
   品項 | Sparkline | 數值+均值 | 偏離度+Badge
   ════════════════════════════════ */
.tbl{width:100%;border-collapse:collapse}
.tbl tr{border-top:1px solid var(--border);transition:background .15s}
.tbl tr:hover{background:rgba(255,255,255,.022)}

/* 欄1：品項名稱 */
.tbl td.c-name{
  font-size:15px;color:var(--text2);
  width:22%;padding:12px 8px 12px 12px;
  vertical-align:middle;
}

/* 欄2：Sparkline 迷你圖 */
.tbl td.c-spark{
  width:28%;padding:8px 10px;
  vertical-align:middle;
}
.spark-wrap{
  position:relative;height:36px;
  display:flex;align-items:center;
}
.spark-wrap canvas{display:block}

/* 欄3：數值 + 3M均值 */
.tbl td.c-val{
  font-family:'DM Mono',monospace;
  text-align:right;font-size:17px;font-weight:500;
  width:24%;padding:12px 8px;vertical-align:middle;
  line-height:1.3;
}
.avg-val{
  display:block;font-size:12px;
  color:var(--text3);font-family:'DM Mono',monospace;
  margin-top:3px;
}

/* 欄4：均值偏離度 + 漲跌Badge */
.tbl td.c-info{
  text-align:right;width:26%;
  padding:12px 12px 12px 4px;vertical-align:middle;
}
.deviation-bar{
  display:flex;align-items:center;justify-content:flex-end;gap:5px;
  margin-bottom:5px;
}
.dev-label{
  font-size:11px;font-family:'DM Mono',monospace;
  color:var(--text3);letter-spacing:.03em;
}
/* 採購建議 tag */
.proc-tag{
  display:inline-block;
  font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:var(--rx);
  letter-spacing:.04em;margin-bottom:4px;
  font-family:'Noto Sans TC',sans-serif;
}
.pt-buy{background:rgba(62,217,138,.12);color:var(--dn);border:1px solid rgba(62,217,138,.22)}
.pt-watch{background:rgba(245,166,35,.1);color:var(--warn);border:1px solid rgba(245,166,35,.2)}
.pt-hold{background:rgba(255,107,107,.1);color:var(--up);border:1px solid rgba(255,107,107,.2)}

/* ── Chart ── */
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.chart-title{font-size:11px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:14px}
.chart-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ctab{
  font-size:13px;padding:6px 15px;border-radius:var(--rx);
  border:1px solid var(--border2);background:transparent;color:var(--text2);
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;font-weight:500;
}
.ctab:hover{color:var(--text);border-color:var(--border3)}
.ctab.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 14px rgba(79,156,249,.3)}
.chart-wrap{position:relative;height:200px}

/* ── RFP ── */
.summary-title{font-size:11px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:12px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:14px 13px;position:relative;overflow:hidden;transition:border-color .2s}
.scard.highlight{border-color:rgba(79,156,249,.2)}
.scard::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--sca,var(--bg4));border-radius:2px 0 0 2px}
.scard-name{font-size:26px;font-weight:600;margin-bottom:10px;padding-left:6px}
.scard-stats{display:flex;gap:12px;padding-left:6px}
.sstat{text-align:center}
.sstat-val{font-size:22px;font-weight:500;font-family:'DM Mono',monospace;line-height:1}
.sstat-lbl{font-size:11px;color:var(--text3);margin-top:3px;letter-spacing:.04em}
.subtotal-bar{
  background:linear-gradient(135deg,var(--bg3),var(--bg2));
  border:1px solid var(--border2);border-radius:var(--rs);
  padding:15px 10px;margin-bottom:16px;
  display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr 1px 1fr;align-items:center;
}
.sub-divider{width:1px;height:28px;background:var(--border);justify-self:center}
.sub-item{text-align:center;padding:0 4px}
.sub-val{font-size:22px;font-weight:400;font-family:'DM Mono',monospace;color:var(--accent);line-height:1}
.sub-lbl{font-size:11px;color:var(--text3);margin-top:4px;letter-spacing:.04em}
.list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.list-title{font-size:11px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.filter-row{display:flex;gap:8px;margin-bottom:14px}
.search-in{flex:1;background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:var(--rs);padding:11px 15px;font-size:15px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s}
.search-in::placeholder{color:var(--text3)}
.search-in:focus{border-color:rgba(79,156,249,.5);box-shadow:0 0 0 3px rgba(79,156,249,.08)}
.owner-sel{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);border-radius:var(--rs);padding:11px 14px;font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;cursor:pointer}
.rfp-list{display:flex;flex-direction:column;gap:8px}
.rfp-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;transition:border-color .22s,box-shadow .22s}
.rfp-item:hover{border-color:var(--border2);box-shadow:0 3px 14px rgba(0,0,0,.2)}
.rfp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.rfp-name{font-size:15px;line-height:1.5;flex:1;font-weight:500}
.days-badge{font-size:12px;font-family:'DM Mono',monospace;padding:4px 12px;border-radius:var(--rx);white-space:nowrap;flex-shrink:0;font-weight:500}
.d-ok{background:rgba(62,217,138,.08);color:var(--dn);border:1px solid rgba(62,217,138,.18)}
.d-warn{background:rgba(245,166,35,.1);color:var(--warn);border:1px solid rgba(245,166,35,.2)}
.d-over{background:rgba(255,107,107,.1);color:var(--up);border:1px solid rgba(255,107,107,.22)}
.rfp-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.meta-tag{font-size:12px;color:var(--text3)}
.owner-tag{font-size:12px;padding:3px 12px;border-radius:var(--rx);font-weight:500}
.progress-box{background:var(--bg3);border-radius:var(--rs);padding:11px 14px;border:1px solid var(--border);border-left:2px solid var(--border2)}
.prog-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.prog-date{font-size:12px;color:var(--accent2);font-family:'DM Mono',monospace;font-weight:500}
.prog-target{font-size:12px;color:var(--text3)}
.prog-text{font-size:14px;color:var(--text2);line-height:1.75;white-space:pre-wrap;word-break:break-all}
.prog-toggle{font-size:13px;color:var(--accent);cursor:pointer;margin-top:5px;display:inline-block}
.prog-full{display:none}
.no-data{text-align:center;padding:40px 20px;color:var(--text3);font-size:15px}
.load-more{width:100%;margin-top:10px;padding:14px;background:var(--bg2);border:1px solid var(--border2);color:var(--text2);border-radius:var(--rs);font-size:15px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s}
.load-more:hover{background:var(--bg3);color:var(--text);border-color:var(--border3)}
.err-box{background:rgba(255,107,107,.06);border:1px solid rgba(255,107,107,.2);border-radius:var(--r);padding:20px;text-align:center;font-size:15px;color:var(--up);margin:20px 0}
.footer{padding:18px 16px;text-align:center;font-size:11px;color:var(--text3);letter-spacing:.08em;border-top:1px solid var(--border)}
.oc-0{--sca:#4f9cf9}.oc-1{--sca:#3ed98a}.oc-2{--sca:#fb923c}
.oc-3{--sca:#ff6b6b}.oc-4{--sca:#a78bfa}.oc-5{--sca:#fbbf24}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="logo-mark">📡</div>
    <div>
      <div class="hdr-title">採購情報中心</div>
      <div class="hdr-sub">遠東新世紀 · 設備採購組</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="status-indicator">
      <div class="dot"></div>
      <span class="status-txt">LIVE</span>
    </div>
    <button class="refresh-btn" onclick="refreshAll()">
      <span id="ri">↻</span> 更新
    </button>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="switchTab('market',this)">📈 今日行情</button>
  <button class="nav-btn" onclick="switchTab('chart',this)">📊 趨勢圖</button>
  <button class="nav-btn" onclick="switchTab('rfp',this)">📋 RFP 案件</button>
</div>

<div class="page active" id="page-market">
  <div id="mkt-load" class="loading">
    <div class="spinner"></div>
    <div class="loading-txt">載入行情資料中...</div>
  </div>
  <div id="mkt-body" style="display:none"></div>
</div>

<div class="page" id="page-chart">
  <div id="ch-load" class="loading">
    <div class="spinner"></div>
    <div class="loading-txt">載入趨勢資料中...</div>
  </div>
  <div id="ch-body" style="display:none">
    <div class="chart-card">
      <div class="chart-title">Price Trend</div>
      <div class="chart-tabs">
        <button class="ctab active" onclick="showTrend('fx',this)">匯率</button>
        <button class="ctab" onclick="showTrend('metal',this)">LME</button>
        <button class="ctab" onclick="showTrend('energy',this)">能源</button>
        <button class="ctab" onclick="showTrend('bdi',this)">航運</button>
        <button class="ctab" onclick="showTrend('precious',this)">貴金屬</button>
      </div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
  </div>
</div>

<div class="page" id="page-rfp">
  <div id="rfp-load" class="loading">
    <div class="spinner"></div>
    <div class="loading-txt">載入案件資料中...</div>
  </div>
  <div id="rfp-body" style="display:none"></div>
</div>

<div class="footer">資料來源：Supabase &nbsp;·&nbsp; 遠東新世紀採購部 設備組</div>

<script>
const SURL="https://idomnpkciupehnpthmgx.supabase.co";
const SKEY="sb_publishable_NLXekzegHw_-kYMTgcCnug_KiHV2Gpx";

let mktData=[],trendData=[],rfpData=[],summaryData=[];
let trendChart=null,rfpFiltered=[],rfpPage=0;
const PAGE_SIZE=15;

// sparkline chart 實例快取，避免重複 create
const sparkCharts={};

async function sb(table,params=""){
  const r=await fetch(`${SURL}/rest/v1/${table}${params}`,{
    headers:{"apikey":SKEY,"Authorization":`Bearer ${SKEY}`}
  });
  if(!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

async function init(){await Promise.all([loadMarket(),loadRFP()]);}

/* ════════════ 行情 ════════════ */
async function loadMarket(){
  try{
    const d=await sb("market_daily","?order=trade_date.desc&limit=90");
    mktData=d; trendData=[...d].reverse();
    const fields=['usd_twd','eur_twd','cny_twd','jpy_twd',
      'copper_lme','aluminium_lme','zinc_lme','tin_lme','nickel_lme','lead_lme',
      'gold','silver','platinum','palladium',
      'wti','brent','bdi','bci','bpi','bsi','iron_ore_58','iron_ore_62'];
    const avgs={};
    fields.forEach(f=>{
      const vals=d.map(r=>+r[f]).filter(v=>!isNaN(v)&&v>0);
      avgs[f]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
    });
    renderMarket(d[0],d[1],avgs);
    document.getElementById("ch-load").style.display="none";
    document.getElementById("ch-body").style.display="block";
  }catch(e){
    document.getElementById("mkt-load").innerHTML=`<div class="err-box">⚠ 無法載入行情<br><small>${e.message}</small></div>`;
  }
}

/* ── 工具函式 ── */
function chg(c,p){if(!c||!p||p==0)return null;return((c-p)/Math.abs(p)*100);}

function fc(c){
  if(c===null)return'<span class="badge b-neu">—</span>';
  const s=c>0?'+':'';
  const cl=c>0?'b-up':c<0?'b-dn':'b-neu';
  return`<span class="badge ${cl}">${s}${c.toFixed(2)}%</span>`;
}
function fh(c){
  if(c===null)return'<span class="badge b-neu">—</span>';
  const hot=Math.abs(c)>=3;
  const s=c>0?'+':'';
  const cl=hot?'b-hot':c>0?'b-up':c<0?'b-dn':'b-neu';
  const f=hot?(c>0?' 🔺':' 🔻'):'';
  return`<span class="badge ${cl}">${s}${c.toFixed(2)}%${f}</span>`;
}

/* 均值偏離度：目前價 vs 3M均值 */
function devBadge(cur, avg){
  if(!cur||!avg) return '';
  const pct=((cur-avg)/avg)*100;
  const s=pct>0?'+':'';
  const label=pct>5?'高位觀望':pct<-5?'低位可鎖':'區間整理';
  const tcls=pct>5?'pt-hold':pct<-5?'pt-buy':'pt-watch';
  const dcls=pct>0?'b-up':pct<0?'b-dn':'b-neu';
  return`<div class="deviation-bar">
    <span class="dev-label">vs均值</span>
    <span class="badge ${dcls}" style="font-size:11px;padding:2px 8px">${s}${pct.toFixed(1)}%</span>
  </div>
  <span class="proc-tag ${tcls}">${label}</span>`;
}

/* Sparkline：取最近20筆，用 canvas 畫極簡折線 */
function sparkId(field){return`sp-${field.replace('_','-')}`;}

function drawSpark(canvasId, vals, color){
  const canvas=document.getElementById(canvasId);
  if(!canvas||!vals||vals.length<2) return;
  // 銷毀舊實例
  if(sparkCharts[canvasId]){sparkCharts[canvasId].destroy();delete sparkCharts[canvasId];}
  const data=vals.slice(-20).map(v=>+v).filter(v=>!isNaN(v)&&v>0);
  sparkCharts[canvasId]=new Chart(canvas,{
    type:'line',
    data:{
      labels:data.map((_,i)=>i),
      datasets:[{
        data,
        borderColor:color,
        borderWidth:1.5,
        pointRadius:0,
        tension:.35,
        fill:true,
        backgroundColor:(ctx)=>{
          const g=ctx.chart.ctx.createLinearGradient(0,0,0,36);
          g.addColorStop(0,color+'28');
          g.addColorStop(1,color+'00');
          return g;
        }
      }]
    },
    options:{
      responsive:false,
      animation:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{x:{display:false},y:{display:false}},
      elements:{line:{borderCapStyle:'round',borderJoinStyle:'round'}}
    }
  });
}

function togSec(id){
  const b=document.getElementById(`${id}-body`);

  if(!b)return;
  const hidden=b.style.display==='none';
  b.style.display=hidden?'':'none';
  t.textContent=hidden?'▾':'▸';
}

  rfpFiltered=rfpData.filter(d=>{
    const mq=!q||(d.case_name||"").toLowerCase().includes(q)||(d.case_no||"").toLowerCase().includes(q);
    const mo=!ow||d.owner===ow;
    return mq&&mo;
  });
  rfpPage=0;renderList();
}

function renderList(){
  const list=document.getElementById("rfp-list");
  if(!list)return;
  const slice=rfpFiltered.slice(0,(rfpPage+1)*PAGE_SIZE);
  if(slice.length===0){list.innerHTML='<div class="no-data">找不到符合的案件</div>';return;}
  const ownerIdx={};
  summaryData.forEach((s,i)=>ownerIdx[s.owner]=i);
  const items=slice.map((d,idx)=>{
    const days=d.days_elapsed||0;
    const dcls=days>90?'d-over':days>60?'d-warn':'d-ok';
    const budget=d.budget_twd?`NT$${(+d.budget_twd/10000).toFixed(0)}萬`:'—';
    const oi=ownerIdx[d.owner]??0;
    const prog=d.latest_progress||'';
    const target=d.latest_target_date||'—';
    const shortProg=prog.length>60?prog.slice(0,60)+'...':prog;
    const hasMore=prog.length>60;
    const uid=`p${idx}`;
    return`<div class="rfp-item">
      <div class="rfp-top">
        <div class="rfp-name">${d.case_name||'—'}</div>
        <span class="days-badge ${dcls}">${days} 天</span>
      </div>
      <div class="rfp-meta">
        <span class="owner-tag" style="color:${ownerColors[oi]};background:${ownerColors[oi]}18;border:1px solid ${ownerColors[oi]}30">${d.owner||'—'}</span>
        <span class="meta-tag">📋 ${d.case_no||'—'}</span>
        <span class="meta-tag">🏢 ${d.unit||'—'}</span>
        <span class="meta-tag">💰 ${budget}</span>
      </div>
      ${prog?`<div class="progress-box">
        <div class="prog-hdr">
          <span class="prog-date">${d.progress_date||''} 進度</span>
          <span class="prog-target">預計結案：${target.replace(/\n/g,' / ')}</span>
        </div>
        <div class="prog-text" id="${uid}-s">${shortProg}</div>
        ${hasMore?`<div class="prog-full prog-text" id="${uid}-f">${prog}</div>
        <span class="prog-toggle" onclick="togProg('${uid}')" id="${uid}-t">▾ 展開</span>`:''}
      </div>`:''}
    </div>`;
  }).join('');
  const hasMore2=rfpFiltered.length>slice.length;
  const moreBtn=hasMore2?`<button class="load-more" onclick="loadMore()">載入更多（剩 ${rfpFiltered.length-slice.length} 筆）</button>`:'';
  list.innerHTML=items+moreBtn;
}

function togProg(uid){
  const s=document.getElementById(`${uid}-s`);
  const f=document.getElementById(`${uid}-f`);
  const t=document.getElementById(`${uid}-t`);
  if(!s||!f||!t)return;
  const open=f.style.display==='block';
  s.style.display=open?'':'none';
  f.style.display=open?'none':'block';
  t.textContent=open?'▾ 展開':'▴ 收合';
}

function loadMore(){rfpPage++;renderList();}

/* ════════════ UI ════════════ */
function switchTab(tab,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  btn.classList.add('active');
  if(tab==='chart'&&trendData.length>0)setTimeout(()=>showTrend('fx'),100);
}

async function refreshAll(){
  const icon=document.getElementById("ri");
  icon.classList.add('spin');
  document.getElementById("mkt-load").style.display="flex";
  document.getElementById("mkt-body").style.display="none";
  document.getElementById("rfp-load").style.display="flex";
  document.getElementById("rfp-body").style.display="none";
  // 銷毀所有 sparkline 實例
  Object.values(sparkCharts).forEach(c=>c.destroy());
  Object.keys(sparkCharts).forEach(k=>delete sparkCharts[k]);
  await Promise.all([loadMarket(),loadRFP()]);
  icon.classList.remove('spin');
}

init();
</script>
